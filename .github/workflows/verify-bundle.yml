name: Verify Kustomize Bundle

on:
  pull_request:
    paths:
      - 'emails/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'config/email-templates/**'

jobs:
  verify-bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate bundle
        run: pnpm generate:all

      - name: Fail if config/email-templates is out of date
        run: |
          if ! git diff --exit-code -- config/email-templates; then
            echo "::error::config/email-templates is out of date. Run 'pnpm generate:all' and commit the result."
            exit 1
          fi
