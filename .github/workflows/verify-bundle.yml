name: Verify Kustomize Bundle

on:
  pull_request:
    paths:
      - 'emails/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'config/email-templates/**'

jobs:
  verify-bundle-up-to-date:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate bundle
        run: pnpm generate:all

      - name: Commit regenerated bundle to the PR branch
        uses: stefanzweifel/git-auto-commit-action@v7.2.0
        with:
          commit_message: "chore: regenerate email template bundle"
          file_pattern: 'config/email-templates/**'
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com

  validate-kustomize:
    permissions:
      contents: read
    uses: datum-cloud/actions/.github/workflows/validate-kustomize.yaml@v1.20.0
